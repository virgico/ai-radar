const HexFrame = ({ children, style, highlight = false }) => {
  const bc = highlight ? C.borderHi : C.border;
  const corners = [{ top: -1, left: -1 }, { top: -1, right: -1 }, { bottom: -1, left: -1 }, { bottom: -1, right: -1 }];
  return React.createElement("div", { style: { position: "relative", background: C.panel, border: `1px solid ${bc}`, borderRadius: 4, boxShadow: highlight ? `0 0 20px rgba(0,240,255,0.08), inset 0 0 30px rgba(0,240,255,0.03)` : `inset 0 0 30px rgba(0,240,255,0.02)`, ...style } },
    corners.map((pos, i) => React.createElement("div", { key: i, style: { position: "absolute", ...pos, width: 12, height: 12, borderTop: pos.top !== undefined ? `2px solid ${C.cyan}` : "none", borderBottom: pos.bottom !== undefined ? `2px solid ${C.cyan}` : "none", borderLeft: pos.left !== undefined ? `2px solid ${C.cyan}` : "none", borderRight: pos.right !== undefined ? `2px solid ${C.cyan}` : "none", zIndex: 1 } })),
    children
  );
};

const RadarChart = ({ scores, size = 340, animate = true }) => {
  const svgRef = useRef(null);
  const [progress, setProgress] = useState(animate ? 0 : 1);

  useEffect(() => {
    if (!animate) { setProgress(1); return; }
    setProgress(0);
    let start = null;
    const step = (ts) => { if (!start) start = ts; const p = Math.min((ts - start) / 1500, 1); setProgress(p * p * (3 - 2 * p)); if (p < 1) requestAnimationFrame(step); };
    requestAnimationFrame(step);
  }, [animate, scores]);

  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current); svg.selectAll("*").remove();
    const w = size, h = size, cx = w / 2, cy = h / 2, maxR = Math.min(w, h) / 2 - 55;
    const n = capabilities.length, angleSlice = (2 * Math.PI) / n;
    const defs = svg.append("defs");
    const filter = defs.append("filter").attr("id", "glow");
    filter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "blur");
    const fm = filter.append("feMerge"); fm.append("feMergeNode").attr("in", "blur"); fm.append("feMergeNode").attr("in", "SourceGraphic");
    const g = svg.append("g").attr("transform", `translate(${cx},${cy})`);

    for (let lvl = 1; lvl <= 5; lvl++) {
      const r = (maxR / 5) * lvl;
      const pts = Array.from({ length: n }, (_, i) => { const a = angleSlice * i - Math.PI / 2; return `${Math.cos(a) * r},${Math.sin(a) * r}`; }).join(" ");
      g.append("polygon").attr("points", pts).attr("fill", "none").attr("stroke", lvl === 5 ? "rgba(0,240,255,0.15)" : "rgba(0,240,255,0.06)").attr("stroke-width", lvl === 5 ? 1.5 : 0.8);
    }

    capabilities.forEach((c, i) => {
      const angle = angleSlice * i - Math.PI / 2;
      const x2 = Math.cos(angle) * maxR, y2 = Math.sin(angle) * maxR;
      g.append("line").attr("x1", 0).attr("y1", 0).attr("x2", x2).attr("y2", y2).attr("stroke", "rgba(0,240,255,0.08)").attr("stroke-width", 0.8).attr("stroke-dasharray", "3,3");
      g.append("circle").attr("cx", x2).attr("cy", y2).attr("r", 2).attr("fill", C.cyan).attr("opacity", 0.4);
      const lx = Math.cos(angle) * (maxR + 32), ly = Math.sin(angle) * (maxR + 32);
      const t = g.append("text").attr("x", lx).attr("y", ly).attr("text-anchor", Math.abs(lx) < 5 ? "middle" : lx > 0 ? "start" : "end").attr("dominant-baseline", Math.abs(ly) < 5 ? "middle" : ly > 0 ? "hanging" : "auto").attr("fill", C.textMid).attr("font-size", "9px").attr("font-family", "'JetBrains Mono', monospace").attr("letter-spacing", "0.04em");
      const words = c.name.split(/[\s/]+/);
      if (words.length <= 2) t.text(c.name.toUpperCase());
      else { const mid = Math.ceil(words.length / 2); t.append("tspan").attr("x", lx).attr("dy", "-0.4em").text(words.slice(0, mid).join(" ").toUpperCase()); t.append("tspan").attr("x", lx).attr("dy", "1.2em").text(words.slice(mid).join(" ").toUpperCase()); }
    });

    const pts = capabilities.map((c, i) => { const val = (scores[c.id] || 0) * progress; const angle = angleSlice * i - Math.PI / 2; const r = (maxR / 5) * val; return [Math.cos(angle) * r, Math.sin(angle) * r]; });
    const gradId = "radarFill";
    const gr = defs.append("linearGradient").attr("id", gradId).attr("x1", "0%").attr("y1", "0%").attr("x2", "100%").attr("y2", "100%");
    gr.append("stop").attr("offset", "0%").attr("stop-color", "#00f0ff"); gr.append("stop").attr("offset", "50%").attr("stop-color", "#d946ef"); gr.append("stop").attr("offset", "100%").attr("stop-color", "#ff2a6d");
    const line = d3.line().x(d => d[0]).y(d => d[1]);
    const pathData = line([...pts, pts[0]]);
    g.append("path").attr("d", pathData).attr("fill", "none").attr("stroke", C.cyan).attr("stroke-width", 6).attr("opacity", 0.08).attr("filter", "url(#glow)");
    g.append("path").attr("d", pathData).attr("fill", `url(#${gradId})`).attr("fill-opacity", 0.12).attr("stroke", `url(#${gradId})`).attr("stroke-width", 2).attr("stroke-opacity", 0.85).attr("filter", "url(#glow)");
    pts.forEach(p => { g.append("circle").attr("cx", p[0]).attr("cy", p[1]).attr("r", 3.5).attr("fill", C.cyan).attr("stroke", "#050a12").attr("stroke-width", 1.5).attr("filter", "url(#glow)"); });
    g.append("line").attr("x1", -8).attr("y1", 0).attr("x2", 8).attr("y2", 0).attr("stroke", C.cyan).attr("stroke-width", 0.5).attr("opacity", 0.3);
    g.append("line").attr("x1", 0).attr("y1", -8).attr("x2", 0).attr("y2", 8).attr("stroke", C.cyan).attr("stroke-width", 0.5).attr("opacity", 0.3);
    g.append("circle").attr("cx", 0).attr("cy", 0).attr("r", 3).attr("fill", "none").attr("stroke", C.cyan).attr("stroke-width", 0.5).attr("opacity", 0.3);
  }, [scores, size, progress]);

  return React.createElement("svg", { ref: svgRef, width: size, height: size, style: { overflow: "visible" } });
};

const DataStream = () => {
  const [particles] = useState(() => Array.from({ length: 40 }, (_, i) => ({ id: i, x: Math.random() * 100, delay: Math.random() * 4, dur: 1.5 + Math.random() * 2, size: 1 + Math.random() * 2, color: Math.random() > 0.5 ? C.cyan : C.pink, opacity: 0.2 + Math.random() * 0.4 })));
  return React.createElement("div", { style: { position: "fixed", inset: 0, pointerEvents: "none", zIndex: 50, overflow: "hidden" } },
    particles.map(p => React.createElement("div", { key: p.id, style: { position: "absolute", left: `${p.x}%`, bottom: -10, width: p.size, height: 10 + Math.random() * 30, borderRadius: 1, background: p.color, opacity: p.opacity, animation: `dataRise ${p.dur}s ${p.delay}s linear forwards` } }))
  );
};

const Counter = ({ target, duration = 1200 }) => {
  const [val, setVal] = useState(0);
  useEffect(() => { let start = null; const step = (ts) => { if (!start) start = ts; const p = Math.min((ts - start) / duration, 1); setVal(p * target); if (p < 1) requestAnimationFrame(step); }; requestAnimationFrame(step); }, [target, duration]);
  return React.createElement("span", null, val.toFixed(1));
};

const generatePDF = async (name, scores, avg, profile) => {
  const w = 595, h = 842, margin = 30, maxY = h - 40;
  const canvas = document.createElement("canvas");
  canvas.width = w * 2; canvas.height = h * 2;
  const ctx = canvas.getContext("2d");
  ctx.scale(2, 2);
  ctx.fillStyle = "#050a12"; ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = "rgba(0,240,255,0.04)"; ctx.lineWidth = 0.5;
  for (let x = 0; x < w; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y < h; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
  ctx.strokeStyle = "rgba(0,240,255,0.2)"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(margin, 55); ctx.lineTo(w - margin, 55); ctx.stroke();
  ctx.fillStyle = "#00f0ff"; ctx.font = "bold 8px monospace";
  ctx.fillText("SYS://RIVERFLEX_AI_RADAR", margin, 42);
  ctx.fillStyle = "rgba(192,232,255,0.3)"; ctx.font = "8px monospace";
  ctx.fillText(new Date().toLocaleDateString("en-GB"), w - 110, 42);
  ctx.fillStyle = "#ffffff"; ctx.font = "bold 18px monospace";
  ctx.fillText(`${(name || "OPERATOR").toUpperCase()}'S READOUT`, margin, 85);
  ctx.fillStyle = profile.color; ctx.font = "bold 13px monospace";
  ctx.fillText(`${profile.label} \u2014 ${profile.rank}`, margin, 105);
  ctx.fillStyle = "rgba(192,232,255,0.5)"; ctx.font = "11px monospace";
  ctx.fillText(`COMPOSITE SCORE: ${avg.toFixed(1)} / 5.0`, margin, 124);

  const radarCx = w / 2, radarCy = 260, maxR = 100, n = capabilities.length;
  const angleSlice = (2 * Math.PI) / n;
  for (let lvl = 1; lvl <= 5; lvl++) {
    const r = (maxR / 5) * lvl;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) { const a = angleSlice * (i % n) - Math.PI / 2; const x = radarCx + Math.cos(a) * r, y = radarCy + Math.sin(a) * r; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
    ctx.closePath(); ctx.strokeStyle = lvl === 5 ? "rgba(0,240,255,0.2)" : "rgba(0,240,255,0.08)"; ctx.lineWidth = 0.8; ctx.stroke();
  }
  capabilities.forEach((c, i) => {
    const a = angleSlice * i - Math.PI / 2;
    const x2 = radarCx + Math.cos(a) * maxR, y2 = radarCy + Math.sin(a) * maxR;
    ctx.beginPath(); ctx.moveTo(radarCx, radarCy); ctx.lineTo(x2, y2);
    ctx.strokeStyle = "rgba(0,240,255,0.1)"; ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
    const lx = radarCx + Math.cos(a) * (maxR + 20), ly = radarCy + Math.sin(a) * (maxR + 20);
    ctx.fillStyle = "rgba(192,232,255,0.6)"; ctx.font = "6.5px monospace";
    ctx.textAlign = Math.abs(lx - radarCx) < 5 ? "center" : lx > radarCx ? "left" : "right";
    ctx.textBaseline = Math.abs(ly - radarCy) < 5 ? "middle" : ly > radarCy ? "top" : "bottom";
    ctx.fillText(c.name.toUpperCase(), lx, ly);
  });
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  ctx.beginPath();
  capabilities.forEach((c, i) => { const val = scores[c.id] || 0; const a = angleSlice * i - Math.PI / 2; const r = (maxR / 5) * val; const x = radarCx + Math.cos(a) * r, y = radarCy + Math.sin(a) * r; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.closePath(); ctx.fillStyle = "rgba(0,240,255,0.12)"; ctx.fill(); ctx.strokeStyle = "#00f0ff"; ctx.lineWidth = 2; ctx.stroke();
  capabilities.forEach((c, i) => { const val = scores[c.id] || 0; const a = angleSlice * i - Math.PI / 2; const r = (maxR / 5) * val; const x = radarCx + Math.cos(a) * r, y = radarCy + Math.sin(a) * r; ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fillStyle = "#00f0ff"; ctx.fill(); });

  let ty = 400;
  ctx.strokeStyle = "rgba(0,240,255,0.15)"; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(margin, ty - 5); ctx.lineTo(w - margin, ty - 5); ctx.stroke();
  ctx.fillStyle = "#00f0ff"; ctx.font = "bold 8px monospace";
  ctx.fillText("\u25C6 FULL TELEMETRY", margin, ty + 8); ty += 20;
  capabilities.forEach(c => {
    if (ty > maxY) return;
    const s = scores[c.id] || 0;
    ctx.fillStyle = "rgba(192,232,255,0.6)"; ctx.font = "9px monospace";
    ctx.fillText(`${c.icon} ${c.name}`, margin, ty);
    ctx.fillStyle = "#fff"; ctx.font = "bold 9px monospace";
    ctx.fillText(`${s}/5 \u2014 ${levelLabels[s - 1] || "N/A"}`, 370, ty);
    ctx.fillStyle = "rgba(0,240,255,0.08)"; ctx.fillRect(margin, ty + 4, w - margin * 2, 3);
    const grad = ctx.createLinearGradient(margin, 0, margin + (w - margin * 2) * (s / 5), 0);
    grad.addColorStop(0, "#00f0ff"); grad.addColorStop(0.5, "#d946ef"); grad.addColorStop(1, "#ff2a6d");
    ctx.fillStyle = grad; ctx.fillRect(margin, ty + 4, (w - margin * 2) * (s / 5), 3);
    ty += 22;
  });

  ty += 8;
  ctx.strokeStyle = "rgba(0,240,255,0.15)"; ctx.beginPath(); ctx.moveTo(margin, ty); ctx.lineTo(w - margin, ty); ctx.stroke();
  ty += 14;
  ctx.fillStyle = "#ffb800"; ctx.font = "bold 8px monospace";
  ctx.fillText("\u25C6 NEXT LEVEL-UP ACTIONS", margin, ty); ty += 14;
  const sorted = capabilities.map(c => ({ ...c, score: scores[c.id] || 0 })).sort((a, b) => a.score - b.score);
  const gapCaps = sorted.slice(0, 3);
  gapCaps.forEach(c => {
    if (ty > maxY) return;
    const s = c.score; if (s >= 5) return;
    const tips = c.nextSteps[s - 1] || c.nextSteps[0];
    ctx.fillStyle = "rgba(192,232,255,0.5)"; ctx.font = "bold 8px monospace";
    ctx.fillText(`${c.icon} ${c.name.toUpperCase()} (${s} \u2192 ${s + 1})`, margin, ty); ty += 12;
    tips.forEach(tip => {
      if (ty > maxY) return;
      const clean = tip.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, "").trim();
      ctx.fillStyle = "rgba(192,232,255,0.4)"; ctx.font = "8px monospace";
      const words = clean.split(" "); let line = "  \u2192 ";
      words.forEach(word => { if (ctx.measureText(line + word + " ").width > w - 70) { if (ty <= maxY) { ctx.fillText(line, margin, ty); ty += 10; } line = "     " + word + " "; } else { line += word + " "; } });
      if (line.trim() && ty <= maxY) { ctx.fillText(line, margin, ty); ty += 10; }
    });
    ty += 4;
  });

  ctx.strokeStyle = "rgba(0,240,255,0.15)"; ctx.beginPath(); ctx.moveTo(margin, h - 28); ctx.lineTo(w - margin, h - 28); ctx.stroke();
  ctx.fillStyle = "rgba(192,232,255,0.25)"; ctx.font = "7px monospace";
  ctx.fillText("RIVERFLEX AI COMPETENCY RADAR // INTELLIGENT TRANSFORMATION", margin, h - 14);

  const link = document.createElement("a");
  link.download = `AI_Radar_${(name || "operator").replace(/\s+/g, "_")}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
};

function App() {
  const [step, setStep] = useState(0);
  const [name, setName] = useState("");
  const [current, setCurrent] = useState(0);
  const [scores, setScores] = useState({});
  const [showData, setShowData] = useState(false);
  const [chartSize, setChartSize] = useState(340);

  useEffect(() => {
    const update = () => setChartSize(window.innerWidth < 500 ? Math.min(window.innerWidth - 60, 280) : 340);
    update(); window.addEventListener("resize", update); return () => window.removeEventListener("resize", update);
  }, []);

  const goResults = () => { setStep(2); setShowData(true); setTimeout(() => setShowData(false), 3500); };
  const reset = () => { setStep(0); setCurrent(0); setScores({}); setName(""); };

  const avg = Object.values(scores).length ? Object.values(scores).reduce((a, b) => a + b, 0) / Object.values(scores).length : 0;
  const profile = getProfile(avg);
  const sortedAll = capabilities.map(c => ({ ...c, score: scores[c.id] || 0 })).sort((a, b) => b.score - a.score);
  const strengths = sortedAll.slice(0, 2);
  const gaps = sortedAll.slice(-2).reverse();

  const mono = "'JetBrains Mono', 'Fira Code', 'Courier New', monospace";
  const btnPrimary = { padding: "14px 32px", borderRadius: 2, fontWeight: 700, fontSize: 12, cursor: "pointer", border: `1px solid ${C.cyan}`, transition: "all 0.2s", fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.12em", background: "rgba(0,240,255,0.08)", color: C.cyan, boxShadow: `0 0 20px rgba(0,240,255,0.15), inset 0 0 20px rgba(0,240,255,0.05)` };
  const btnSecondary = { ...btnPrimary, background: "rgba(255,42,109,0.06)", color: C.pink, border: `1px solid rgba(255,42,109,0.3)`, boxShadow: `0 0 15px rgba(255,42,109,0.1)` };
  const btnGold = { ...btnPrimary, background: "rgba(255,184,0,0.06)", color: C.amber, border: `1px solid rgba(255,184,0,0.3)`, boxShadow: `0 0 15px rgba(255,184,0,0.1)` };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: mono, position: "relative", overflow: "hidden" }}>
      <SciFiBg />
      {showData && <DataStream />}

      <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 10, padding: "10px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${C.border}`, background: "rgba(5,10,18,0.8)", backdropFilter: "blur(10px)" }}>
        <span style={{ fontSize: 10, color: C.textDim, letterSpacing: "0.2em" }}>SYS://RIVERFLEX_AI_RADAR</span>
        <span style={{ fontSize: 10, color: C.textDim, letterSpacing: "0.1em", animation: "textFlicker 4s infinite" }}>{"\u25CF"} ONLINE</span>
      </div>

      <div style={{ position: "relative", zIndex: 1, maxWidth: 820, margin: "0 auto", padding: "60px 20px 40px", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>

        {step === 0 && (
          <div className="fade-in" style={{ textAlign: "center", width: "100%" }}>
            <div style={{ width: 80, height: 80, margin: "0 auto 24px", borderRadius: "50%", border: `1px solid ${C.cyan}`, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: `0 0 40px rgba(0,240,255,0.15), inset 0 0 20px rgba(0,240,255,0.05)`, animation: "borderPulse 3s ease-in-out infinite" }}>
              <span style={{ fontSize: 32 }}>{"\u25C7"}</span>
            </div>
            <div style={{ fontSize: 10, color: C.cyan, letterSpacing: "0.3em", marginBottom: 12 }}>// INITIALIZING DIAGNOSTIC PROTOCOL</div>
            <h1 style={{ fontSize: "clamp(26px, 5vw, 44px)", fontWeight: 800, letterSpacing: "-0.02em", color: "#fff", marginBottom: 8, animation: "textFlicker 5s infinite" }}>AI COMPETENCY RADAR</h1>
            <p style={{ color: C.textDim, fontSize: 12, marginBottom: 32, lineHeight: 1.8, letterSpacing: "0.05em", maxWidth: 520, margin: "0 auto 32px" }}>
              ASSESS YOUR AI PROFICIENCY ACROSS 6 DIMENSIONS {"\u25B8"} FROM AWARENESS TO EXPERT {"\u25B8"} GET YOUR PERSONALISED LEVEL-UP PLAN
            </p>
            <HexFrame style={{ maxWidth: 440, margin: "0 auto 24px", padding: 20 }}>
              <div style={{ fontSize: 9, color: C.textDim, letterSpacing: "0.2em", marginBottom: 8 }}>OPERATOR ID</div>
              <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name..." style={{ width: "100%", background: "rgba(0,240,255,0.03)", border: `1px solid ${C.border}`, borderRadius: 2, padding: "10px 14px", color: C.text, fontSize: 13, fontFamily: mono, transition: "all 0.2s", letterSpacing: "0.05em" }} />
            </HexFrame>
            <button style={btnPrimary} onClick={() => setStep(1)}>{"\u25B6"} INITIATE SCAN</button>
            <p style={{ marginTop: 24, color: C.textDim, fontSize: 10, letterSpacing: "0.15em" }}>6 COMPETENCY VECTORS {"\u25B8"} 5 LEVELS EACH {"\u25B8"} ~3 MIN</p>
          </div>
        )}

        {step === 1 && (
          <div className="fade-in" key={current} style={{ width: "100%" }}>
            <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 24 }}>
              {capabilities.map((_, i) => (
                <div key={i} style={{ width: 44, height: 3, borderRadius: 1, background: i < current ? C.cyan : i === current ? C.pink : "rgba(0,240,255,0.1)", boxShadow: i === current ? `0 0 8px ${C.pink}` : i < current ? `0 0 6px rgba(0,240,255,0.3)` : "none", transition: "all 0.3s" }} />
              ))}
            </div>
            <div style={{ textAlign: "center", marginBottom: 16, color: C.textDim, fontSize: 10, letterSpacing: "0.2em" }}>VECTOR {current + 1}/{capabilities.length} {"\u25B8"} SCANNING</div>

            <HexFrame highlight style={{ padding: "28px 22px", maxWidth: 620, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                <div style={{ width: 44, height: 44, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${C.border}`, background: "rgba(0,240,255,0.04)", fontSize: 22 }}>{capabilities[current].icon}</div>
                <h2 style={{ fontSize: 17, fontWeight: 700, letterSpacing: "0.02em", color: "#fff" }}>{capabilities[current].name}</h2>
              </div>
              <p style={{ color: C.textDim, fontSize: 11, lineHeight: 1.7, marginBottom: 20 }}>{capabilities[current].description}</p>

              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {capabilities[current].levels.map((l, idx) => {
                  const val = idx + 1;
                  const selected = scores[capabilities[current].id] === val;
                  const colors = [C.cyan, C.green, "#00f0ff", C.purple, C.pink];
                  const barColor = selected ? colors[idx] : "transparent";
                  return (
                    <div key={val} onClick={() => setScores(s => ({ ...s, [capabilities[current].id]: val }))} style={{ padding: "10px 14px", borderRadius: 2, cursor: "pointer", display: "flex", alignItems: "flex-start", gap: 12, background: selected ? "rgba(0,240,255,0.06)" : "rgba(0,240,255,0.01)", border: `1px solid ${selected ? barColor : "rgba(0,240,255,0.06)"}`, boxShadow: selected ? `0 0 15px ${barColor}20, inset 0 0 20px ${barColor}08` : "none", transition: "all 0.2s ease", position: "relative", overflow: "hidden" }}>
                      <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: selected ? barColor : "transparent", transition: "all 0.2s" }} />
                      <div style={{ width: 28, height: 28, borderRadius: 2, display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${selected ? barColor : "rgba(0,240,255,0.1)"}`, background: selected ? `${barColor}15` : "transparent", color: selected ? barColor : C.textDim, fontWeight: 700, fontSize: 12, flexShrink: 0, fontFamily: mono }}>{val}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 600, fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", color: selected ? "#fff" : C.textMid, marginBottom: 2 }}>{l.label}</div>
                        <div style={{ fontSize: 10.5, color: selected ? C.textMid : C.textDim, lineHeight: 1.6 }}>{l.desc}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </HexFrame>

            <div style={{ display: "flex", justifyContent: "center", gap: 12, marginTop: 24 }}>
              {current > 0 && <button style={btnSecondary} onClick={() => setCurrent(c => c - 1)}>{"\u25C0"} PREV</button>}
              <button style={{ ...btnPrimary, opacity: scores[capabilities[current].id] ? 1 : 0.3, pointerEvents: scores[capabilities[current].id] ? "auto" : "none" }} onClick={() => { if (current < capabilities.length - 1) setCurrent(c => c + 1); else goResults(); }}>
                {current === capabilities.length - 1 ? "\u25B6 COMPILE RESULTS" : "NEXT \u25B6"}
              </button>
            </div>
          </div>
        )}

        {step === 2 && (
          <div className="fade-in" style={{ width: "100%", textAlign: "center" }}>
            <div style={{ fontSize: 10, color: C.cyan, letterSpacing: "0.3em", marginBottom: 8 }}>// DIAGNOSTIC COMPLETE</div>
            <h1 style={{ fontSize: "clamp(22px, 4vw, 32px)", fontWeight: 800, color: "#fff", marginBottom: 4, letterSpacing: "0.05em" }}>
              {name ? `${name.toUpperCase()}'S` : "OPERATOR"} READOUT
            </h1>
            <div style={{ marginBottom: 24 }} />

            <HexFrame highlight style={{ display: "inline-block", padding: 20, marginBottom: 24 }}>
              <RadarChart scores={scores} size={chartSize} animate={true} />
            </HexFrame>

            <HexFrame style={{ padding: 24, maxWidth: 560, margin: "0 auto 20px", display: "flex", alignItems: "center", justifyContent: "center", gap: 28, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize: 10, color: C.textDim, letterSpacing: "0.2em", marginBottom: 4 }}>COMPOSITE SCORE</div>
                <div style={{ fontSize: 52, fontWeight: 800, color: profile.color, textShadow: `0 0 30px ${profile.glow}40` }}><Counter target={avg} duration={1400} /></div>
                <div style={{ fontSize: 10, color: C.textDim, letterSpacing: "0.1em" }}>/ 5.0</div>
              </div>
              <div style={{ textAlign: "left" }}>
                <div style={{ fontSize: 10, color: C.textDim, letterSpacing: "0.2em", marginBottom: 6 }}>CLASSIFICATION</div>
                <div style={{ padding: "10px 20px", borderRadius: 2, border: `1px solid ${profile.color}50`, background: `${profile.color}08`, boxShadow: `0 0 20px ${profile.color}15` }}>
                  <div style={{ fontSize: 20, fontWeight: 800, color: profile.color, letterSpacing: "0.1em" }}>{profile.label}</div>
                  <div style={{ fontSize: 10, color: profile.color, opacity: 0.6, letterSpacing: "0.2em" }}>{profile.rank}</div>
                </div>
              </div>
            </HexFrame>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, maxWidth: 560, margin: "0 auto 20px" }}>
              <HexFrame style={{ padding: 18, textAlign: "left" }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: C.green, letterSpacing: "0.2em", marginBottom: 14 }}>{"\u25C6"} PEAK VECTORS</div>
                {strengths.map(s => (<div key={s.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}><span style={{ fontSize: 11, color: C.textMid }}>{s.icon} {s.name}</span><span style={{ fontWeight: 700, color: C.green, fontSize: 14, textShadow: `0 0 10px ${C.green}40` }}>{s.score}</span></div>))}
              </HexFrame>
              <HexFrame style={{ padding: 18, textAlign: "left" }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: C.amber, letterSpacing: "0.2em", marginBottom: 14 }}>{"\u25C6"} WEAK SECTORS</div>
                {gaps.map(s => (<div key={s.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}><span style={{ fontSize: 11, color: C.textMid }}>{s.icon} {s.name}</span><span style={{ fontWeight: 700, color: C.amber, fontSize: 14, textShadow: `0 0 10px ${C.amber}40` }}>{s.score}</span></div>))}
              </HexFrame>
            </div>

            <HexFrame style={{ padding: 22, maxWidth: 560, margin: "0 auto 20px", textAlign: "left" }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: C.amber, letterSpacing: "0.2em", marginBottom: 16 }}>{"\u25C6"} YOUR LEVEL-UP PLAN {"\u{1F3AE}"}</div>
              {capabilities.map(c => {
                const s = scores[c.id] || 0;
                if (s >= 5) return null;
                const tips = c.nextSteps[s - 1] || c.nextSteps[0];
                return (
                  <div key={c.id} style={{ marginBottom: 18, paddingLeft: 14, borderLeft: `2px solid ${C.amber}30` }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: C.amber, marginBottom: 6, letterSpacing: "0.06em" }}>
                      {c.icon} {c.name.toUpperCase()} <span style={{ color: C.textDim, fontWeight: 400 }}>({levelLabels[s - 1]} {"\u2192"} {levelLabels[s]})</span>
                    </div>
                    {tips.map((tip, i) => (
                      <div key={i} style={{ fontSize: 11, color: C.textMid, lineHeight: 1.7, marginBottom: 4, paddingLeft: 8 }}>{"\u2192"} {tip}</div>
                    ))}
                  </div>
                );
              })}
            </HexFrame>

            <HexFrame style={{ padding: 22, maxWidth: 560, margin: "0 auto 24px", textAlign: "left" }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: C.cyan, letterSpacing: "0.2em", marginBottom: 16 }}>{"\u25C6"} FULL TELEMETRY</div>
              {capabilities.map(c => {
                const s = scores[c.id] || 0;
                return (
                  <div key={c.id} style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5, flexWrap: "wrap", gap: 4 }}>
                      <span style={{ fontSize: 11, color: C.textMid }}>{c.icon} {c.name}</span>
                      <span style={{ fontSize: 11, fontWeight: 600, color: C.text, letterSpacing: "0.05em" }}>{s}/5 {"\u25B8"} {(levelLabels[s - 1] || "").toUpperCase()}</span>
                    </div>
                    <div style={{ height: 4, borderRadius: 1, background: "rgba(0,240,255,0.06)", position: "relative", overflow: "hidden" }}>
                      <div style={{ height: "100%", borderRadius: 1, width: `${(s / 5) * 100}%`, background: `linear-gradient(90deg, ${C.cyan}, ${C.purple}, ${C.pink})`, boxShadow: `0 0 8px ${C.cyan}40`, transition: "width 1.2s cubic-bezier(0.16, 1, 0.3, 1)" }} />
                    </div>
                  </div>
                );
              })}
            </HexFrame>

            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <button style={btnSecondary} onClick={reset}>{"\u25C0"} RESTART</button>
              <button style={btnGold} onClick={() => generatePDF(name, scores, avg, profile)}>{"\u{1F4C4}"} DOWNLOAD REPORT</button>
              <button style={btnPrimary} onClick={() => { const data = btoa(JSON.stringify({ name, scores })); navigator.clipboard.writeText(window.location.origin + "?r=" + data); alert("Link copied!"); }}>{"\u25C7"} SHARE LINK</button>
            </div>
          </div>
        )}
      </div>

      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 10, padding: "8px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${C.border}`, background: "rgba(5,10,18,0.8)", backdropFilter: "blur(10px)", fontSize: 9, color: C.textDim, letterSpacing: "0.15em" }}>
        <span>v4.0 // RIVERFLEX_iT</span>
        <span style={{ animation: "textFlicker 6s infinite" }}>{"\u25C7"} INTELLIGENCE TRANSFORMATION</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
